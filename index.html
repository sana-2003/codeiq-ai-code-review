<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CodeIQ — AI Code Review</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--bg1:#161b22;--bg2:#21262d;--bg3:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --green:#3fb950;--amber:#e3b341;--red:#f85149;--blue:#58a6ff;--purple:#bc8cff;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}

/* TOPBAR *//
.topbar{background:var(--bg1);border-bottom:1px solid var(--bg3);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text);}
.logo span{color:var(--blue);}
.health{font-family:var(--mono);font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;}
.hdot{width:7px;height:7px;border-radius:50%;background:var(--green);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 52px);}

/* LEFT: CODE INPUT */
.left{border-right:1px solid var(--bg3);display:flex;flex-direction:column;}
.panel-header{padding:12px 20px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-title{font-family:var(--mono);font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;}
.lang-select{font-family:var(--mono);font-size:11px;background:var(--bg2);border:1px solid var(--bg3);color:var(--text2);padding:4px 10px;border-radius:4px;outline:none;}
.code-editor{flex:1;padding:16px 20px;font-family:var(--mono);font-size:13px;line-height:1.6;background:var(--bg);color:var(--text);border:none;outline:none;resize:none;tab-size:2;}
.code-editor::placeholder{color:var(--text3);}
.run-bar{padding:12px 20px;border-top:1px solid var(--bg3);display:flex;align-items:center;gap:12px;background:var(--bg1);flex-shrink:0;}
.run-btn{padding:9px 20px;background:var(--blue);color:var(--bg);border:none;border-radius:6px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s;display:flex;align-items:center;gap:8px;}
.run-btn:hover{opacity:0.85;}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;}
.char-count{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto;}
.clear-btn{font-family:var(--mono);font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;transition:color 0.15s;}
.clear-btn:hover{color:var(--red);}

/* RIGHT: RESULTS */
.right{display:flex;flex-direction:column;overflow:hidden;}
.results-area{flex:1;overflow-y:auto;padding:16px 20px;}
.results-area::-webkit-scrollbar{width:4px;}
.results-area::-webkit-scrollbar-thumb{background:var(--bg3);}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3;}
.empty-title{font-size:16px;color:var(--text2);margin-bottom:6px;}

/* PROGRESS */
.progress-bar{height:2px;background:var(--bg3);overflow:hidden;flex-shrink:0;}
.progress-fill{height:100%;background:var(--blue);transition:width 0.8s ease;width:0%;}

/* REVIEW CARDS */
.review-card{background:var(--bg1);border:1px solid var(--bg3);border-radius:8px;margin-bottom:12px;overflow:hidden;animation:slide-in 0.3s ease;}
@keyframes slide-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.review-card-header{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.review-icon{font-size:16px;}
.review-cat{font-size:13px;font-weight:600;}
.review-toggle{margin-left:auto;color:var(--text3);font-size:12px;transition:transform 0.2s;}
.review-card.open .review-toggle{transform:rotate(180deg);}
.review-body{padding:0 16px 16px;font-size:13px;line-height:1.7;color:var(--text2);display:none;white-space:pre-wrap;}
.review-card.open .review-body{display:block;}

/* SEVERITY BADGES */
.sev-critical{color:var(--red);}
.sev-high{color:var(--amber);}
.sev-low{color:var(--green);}
.sev-safe{color:var(--green);}

/* SCORE BAR */
.score-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.score-box{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:10px;text-align:center;}
.score-val{font-family:var(--mono);font-size:20px;font-weight:600;}
.score-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;margin-top:3px;}

/* STATUS BAR */
.status-bar{padding:8px 20px;border-top:1px solid var(--bg3);background:var(--bg1);display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text3);flex-shrink:0;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.status-dot.active{background:var(--blue);animation:pulse 1s infinite;}
.status-dot.done{background:var(--green);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* SPINNER */
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(88,166,255,0.2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:800px){.layout{grid-template-columns:1fr;grid-template-rows:50vh 1fr;}.left{border-right:none;border-bottom:1px solid var(--bg3);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Code<span>IQ</span></div>
  <div class="health"><div class="hdot" id="hdot"></div><span id="healthLabel">connecting...</span></div>
</div>

<div class="layout">

  <!-- LEFT: CODE INPUT -->
  <div class="left">
    <div class="panel-header">
      <span class="panel-title">Paste Your Code</span>
      <select class="lang-select" id="langSelect">
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="java">Java</option>
        <option value="cpp">C++</option>
        <option value="go">Go</option>
        <option value="rust">Rust</option>
        <option value="sql">SQL</option>
      </select>
    </div>
    <textarea class="code-editor" id="codeEditor" placeholder="Paste your code here...

Example:
def get_user(user_id):
    query = 'SELECT * FROM users WHERE id = ' + user_id
    return db.execute(query)"></textarea>
    <div class="run-bar">
      <button class="run-btn" id="runBtn" onclick="startReview()">
        <span>▶</span> Review Code
      </button>
      <button class="clear-btn" onclick="clearCode()">Clear</button>
      <span class="char-count" id="charCount">0 lines</span>
    </div>
  </div>

  <!-- RIGHT: RESULTS -->
  <div class="right">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="results-area" id="resultsArea">
      <div class="empty" id="emptyState">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">AI Code Review</div>
        <div style="font-size:13px;color:var(--text3);">Paste code on the left and click Review.<br/>4 specialized AI reviewers analyze your code.</div>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready</span>
      <span style="margin-left:auto;font-family:var(--mono);font-size:10px;" id="wsStatus">WS: disconnected</span>
    </div>
  </div>

</div>

<script>
const API = 'http://localhost:8002';
const WS_BASE = 'ws://localhost:8002/ws';

let ws = null;
let currentSessionId = null;
let reviewCount = 0;

// Line counter
document.getElementById('codeEditor').addEventListener('input', function() {
  const lines = this.value.split('\n').length;
  document.getElementById('charCount').textContent = `${lines} lines`;
});

function clearCode() {
  document.getElementById('codeEditor').value = '';
  document.getElementById('charCount').textContent = '0 lines';
}

async function startReview() {
  const code = document.getElementById('codeEditor').value.trim();
  if (!code) { alert('Please paste some code first'); return; }
  const language = document.getElementById('langSelect').value;

  document.getElementById('runBtn').disabled = true;
  document.getElementById('runBtn').innerHTML = '<span class="spinner"></span> Reviewing...';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultsArea').innerHTML = '';
  document.getElementById('progressFill').style.width = '5%';
  setStatus('Starting review...', 'active');
  reviewCount = 0;

  try {
    const res = await fetch(`${API}/api/review`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ code, language })
    });
    const data = await res.json();
    currentSessionId = data.session_id;
    connectWS(data.session_id);
  } catch(e) {
    alert('Backend not running. Start the server first.');
    resetBtn();
  }
}

function connectWS(sessionId) {
  ws = new WebSocket(`${WS_BASE}/${sessionId}`);
  ws.onopen = () => document.getElementById('wsStatus').textContent = 'WS: connected';
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    handleEvent(msg.event, msg.data);
  };
  ws.onclose = () => document.getElementById('wsStatus').textContent = 'WS: disconnected';
}

function handleEvent(event, data) {
  if (event === 'review_start') {
    const pct = ((data.step - 1) / data.total) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    setStatus(data.message, 'active');
  } else if (event === 'review_complete') {
    reviewCount++;
    document.getElementById('progressFill').style.width = (reviewCount / 5 * 100) + '%';
    addReviewCard(data);
    if (data.category === 'Summary') {
      setStatus('Review complete ✓', 'done');
      resetBtn();
    }
  }
}

function addReviewCard(data) {
  const area = document.getElementById('resultsArea');
  const card = document.createElement('div');
  card.className = 'review-card' + (data.category === 'Summary' ? ' open' : '');
  
  // Color the header based on category
  const colors = {
    'Bugs & Errors': 'var(--red)',
    'Security': 'var(--amber)',
    'Code Quality': 'var(--blue)',
    'Performance': 'var(--purple)',
    'Summary': 'var(--green)'
  };
  const color = colors[data.category] || 'var(--text2)';

  card.innerHTML = `
    <div class="review-card-header" onclick="toggleCard(this)">
      <span class="review-icon">${data.icon}</span>
      <span class="review-cat" style="color:${color}">${data.category}</span>
      <span class="review-toggle">▼</span>
    </div>
    <div class="review-body">${escHtml(data.output)}</div>`;
  
  area.appendChild(card);
  area.scrollTop = area.scrollHeight;
}

function toggleCard(header) {
  header.parentElement.classList.toggle('open');
}

function setStatus(msg, type) {
  document.getElementById('statusText').textContent = msg;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (type ? ' ' + type : '');
}

function resetBtn() {
  document.getElementById('runBtn').disabled = false;
  document.getElementById('runBtn').innerHTML = '<span>▶</span> Review Code';
  document.getElementById('progressFill').style.width = '100%';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Health check
fetch(`${API}/api/health`).then(r => r.json()).then(d => {
  document.getElementById('hdot').style.background = d.groq_available ? '#3fb950' : '#e3b341';
  document.getElementById('healthLabel').textContent = d.groq_available ? 'Groq AI Ready' : 'Demo Mode';
}).catch(() => {
  document.getElementById('hdot').style.background = '#f85149';
  document.getElementById('healthLabel').textContent = 'Backend offline';
});
</script>
</body>
</html>
